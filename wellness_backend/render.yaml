services:
  - type: web
    name: rhythm-backend
    env: python
    rootDir: wellness_backend
    plan: free
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn api_server:app --app-dir src --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-haiku-4-5-20251001
      - key: USE_REAL_LLM
        value: "1"
      - key: LLM_STRICT
        value: "1"
      - key: PYTHON_VERSION
        value: 3.11.9
